<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Kata Sandi - Sedela</title>
    <link rel="stylesheet" href="../CSS/forgot.css">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <img src="../assets/logo.png" alt="LOGO" class="material-logo">
            <p>Masukkan Email untuk Reset Kata Sandi</p>
        </div>

        <form id="forgotForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="email" id="email" required>
                    <label>Email</label>
                    <div class="input-line"></div>
                </div>
            </div>

            <button type="submit" class="material-btn">Kirim OTP</button>
        </form>
    </div>
</div>
<script src="../javascript/forgot.js"></script>
</body>
</html>
