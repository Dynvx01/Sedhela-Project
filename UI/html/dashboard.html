<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sedhela Bank</title>
    <link rel="stylesheet" href="../CSS/dashboard.css">
</head>
<body>

<div class="dashboard-container">

    <!-- Header -->
    <header class="dashboard-header">

        <div class="header-left">
            <img src="../assets/logo.png" alt="LOGO" class="material-logo">
        </div>

        <div class="header-right">
            <div class="user-menu">
                <button id="userButton" class="user-button">
                    👤 
                </button>

                <div id="dropdownMenu" class="dropdown-menu">
                    <div class="dropdown-item" id="profilMenu">Profil</div>
                    <div class="dropdown-item" id="pengaturanMenu">Pengaturan</div>
                    <div class="dropdown-item logout" id="logoutMenu">Logout</div>
                </div>
            </div>
        </div>

    </header>

       <section class="welcome-section">
            <p class="welcome-text">Selamat Datang,</p>
            <h2 id="userName"></h2>
        </section>

    <!-- Menu Cards -->
    <section class="menu-section">

        <div class="menu-card" id="bukaRekening">
            <h3>BUKA REKENING</h3>
        </div>

        <div class="menu-card" id="cekStatus">
            <h3>CEK STATUS</h3>
        </div>

        <div class="menu-card" id="ambilAntrian">
            <h3>AMBIL ANTRIAN</h3>
        </div>

    </section>

</div>

<script src="../javascript/dashboard.js"></script>
</body>
</html>
