<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubah Password - Sedela</title>
    <link rel="stylesheet" href="../CSS/reset-password.css">
</head>
<!--MAIN RESET PASSWORD PAGE CONTENT-->
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <img src="../assets/logo.png" alt="LOGO" class="material-logo">
            <p>Buat Kata Sandi Baru Anda</p>
        </div>

        <form id="resetPasswordForm">

    <!--IKON MATA DI PROGRAM BELUM SESUAI, PLEASE FIX IT AGAIN-->

            <!-- PASSWORD BARU -->
            <div class="form-group">
                <div class="input-wrapper password-wrapper">
                    <input type="password" id="newPassword" required>
                    <label>Password Baru</label>
                    <div class="input-line"></div>

                    <button type="button"
                            class="password-toggle"
                            id="toggleNewPassword"
                            aria-label="Toggle password visibility">
                        <div class="toggle-ripple"></div>
                        <span class="toggle-icon"></span>
                    </button>

                    <div class="ripple-container"></div>
                </div>
            </div>

            <!-- KONFIRMASI PASSWORD -->
            <div class="form-group">
                <div class="input-wrapper password-wrapper">
                    <input type="password" id="confirmPassword" required>
                    <label>Konfirmasi Password</label>
                    <div class="input-line"></div>

                    <button type="button"
                            class="password-toggle"
                            id="toggleConfirmPassword"
                            aria-label="Toggle password visibility">
                        <div class="toggle-ripple"></div>
                        <span class="toggle-icon"></span>
                    </button>

                    <div class="ripple-container"></div>
                </div>
            </div>

            <button type="submit" class="material-btn">
                Ubah Password
            </button>

        </form>
    </div>
</div>
<script src="../javascript/reset-password.js"></script>
</body>
<!--END RESET PASSWORD PAGE CONTENT-->
</html>
